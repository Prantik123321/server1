# render.yaml - Blueprint for Render.com deployment
services:
  - type: web
    name: space-shooter-server
    runtime: node
    repo: https://github.com/yourusername/space-shooter-server
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    env:
      - key: WEBSOCKET_URL
        value: wss://space-shooter-server.onrender.com